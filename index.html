<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>potionshop — a geode like</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>potionshop <a href="README.md" target="_blank" class="docs-link">docs</a></h1>
      <label>
        bpm
        <input id="bpm" type="number" min="30" max="300" step="1" value="130" />
      </label>
      <label>
        midi out
        <select id="midi-out" disabled>
          <option value="">— none —</option>
        </select>
      </label>
      <label>
        <input id="mute-audio" type="checkbox" />
        mute
      </label>
      <button id="play-stop" type="button" disabled>■ stop</button>
    </header>

    <main id="main" class="debug">
      <div class="top-row">
        <section class="grid-wrap">
          <div class="grid-frame">
            <div id="grid" class="grid" aria-label="monome-style 16x8 grid"></div>
            <div id="audio-overlay" class="audio-overlay">
              <button id="start" class="start-btn" type="button">▸ click to start audio</button>
              <p class="start-hint">browsers block audio until a user gesture · this enables web audio for the session</p>
            </div>
          </div>
        </section>
      </div>

      <p class="status" id="status">click grid to start audio</p>

      <!-- repl-help: hidden by default, shown in debug mode -->

      </div> -->

      <!-- debug panel: hidden by default, shown in debug mode -->
      <section class="repl">
        <h2 class="repl-header">repl</h2>
        <div id="repl-editor" class="repl-editor" aria-label="javascript repl"></div>
        <div class="repl-actions">
          <button id="repl-run" class="repl-btn" type="button">run ▸</button>
          <button id="repl-clear" class="repl-btn" type="button">clear output</button>
          <span class="repl-hint">cmd-enter (or ctrl-enter) also runs · console.log mirrored below</span>
        </div>
        <div id="repl-output" class="repl-output" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
